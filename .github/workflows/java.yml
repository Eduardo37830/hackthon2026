name: Desplegar Backend Java

on:
  push:
    branches: [ main ]
    paths: [ 'Backend/Java/**' ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17' # Coincide con tu pom.xml
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: |
          cd Backend/Java
          # Usamos 'mvn' directamente porque GitHub ya lo tiene instalado.
          # Esto evita el error del 'maven-wrapper' que falta en tu repo.
          mvn clean package -DskipTests

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'api-java-aves'
          publish-profile: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_WAVE_0AC496B0F }}
          package: 'Backend/Java/target/*.jar'
